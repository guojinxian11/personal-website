<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加微信 | 好耶</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-text: #111111;
      --color-pink: #FF5A5F;
      --color-green: #07C160;
      --shadow-hard: 6px 6px 0px #000;
      --shadow-hard-hover: 10px 10px 0px #000;
      --radius-card: 24px;
      --border-thick: 3px solid #000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wechat-card {
      background: #fff;
      border: var(--border-thick);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-hard);
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardPop {
      0% { transform: scale(0.8) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .wechat-icon {
      width: 64px;
      height: 64px;
      background: var(--color-green);
      border-radius: 50%;
      border: var(--border-thick);
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      box-shadow: 4px 4px 0 #000;
    }

    .wechat-icon svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .wechat-card h1 {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .wechat-card p {
      color: #666;
      font-size: 1rem;
      margin-bottom: 28px;
    }

    .qr-wrapper {
      display: inline-block;
      background: #fff;
      border: var(--border-thick);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow-hard);
      margin-bottom: 28px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .qr-wrapper:hover {
      transform: translate(-3px, -3px);
      box-shadow: var(--shadow-hard-hover);
    }

    .qr-wrapper img {
      width: 220px;
      height: 220px;
      border-radius: 10px;
      display: block;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      border: var(--border-thick);
      background: var(--color-text);
      color: #fff;
      box-shadow: var(--shadow-hard);
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      font-family: inherit;
    }

    .back-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-hard-hover);
    }

    @media (max-width: 480px) {
      .wechat-card {
        padding: 32px 24px;
      }
      .qr-wrapper img {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="wechat-card">
    <div class="wechat-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.27-.027-.407-.032zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
      </svg>
    </div>
    <h1>添加微信</h1>
    <p>扫描二维码添加我的微信</p>
    <div class="qr-wrapper">
      <img src="images/wechat-qr.jpg" alt="微信二维码">
    </div>
    <br>
    <a href="index.html#accounts" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      返回主页
    </a>
  </div>
</body>
</html>
